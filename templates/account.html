{% extends "base.html" %}
{% block title %}My Account{% endblock %}
{% block page_title %}My Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header bg-white py-3"><strong><i class="bi bi-person-circle"></i> Change Password</strong></div>
      <div class="card-body">
        <p class="text-muted small">Logged in as <strong>{{ current_user.username }}</strong> ({{ current_user.role }})</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input name="old_password" type="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input name="new_password" type="password" class="form-control" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-navy w-100">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
