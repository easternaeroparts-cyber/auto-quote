<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Eastern Aero Parts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(26,60,110,.13); }
    .login-header { background: #1a3c6e; border-radius: 16px 16px 0 0; padding: 32px 32px 24px; text-align: center; }
    .login-body { padding: 32px; }
    .form-control:focus { border-color: #1a3c6e; box-shadow: 0 0 0 .2rem rgba(26,60,110,.15); }
    .btn-login { background: #1a3c6e; color: #fff; border: none; padding: 10px; font-weight: 600; font-size: 1rem; }
    .btn-login:hover { background: #14305a; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <div style="font-size:2.5rem; margin-bottom:8px;">✈</div>
      <h4 class="text-white fw-bold mb-1">Eastern Aero Parts</h4>
      <p class="text-white-50 mb-0" style="font-size:.9rem">Auto Quote System</p>
    </div>
    <div class="login-body">
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}
          <div class="alert alert-{{ 'danger' if cat=='error' else 'success' }} py-2 small">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input name="username" type="text" class="form-control" placeholder="Enter username" autofocus required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input name="password" type="password" class="form-control" placeholder="Enter password" required>
          </div>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" name="remember" id="remember">
          <label class="form-check-label" for="remember">Keep me logged in</label>
        </div>
        <button type="submit" class="btn btn-login w-100 rounded-3">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
